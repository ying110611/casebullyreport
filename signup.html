<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SMK GAJAH BERANG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #6366f1; }
        .glass-container { background: rgba(255, 255, 255, 0.98); }
        .school-logo { width: 65px; height: 65px; object-fit: contain; margin: 0 auto 1rem; }

        /* Custom toggle styling that works without JS */
        .role-option input[type="radio"] { display: none; }
        
        .role-option label {
            display: block;
            padding: 8px 0;
            text-align: center;
            border: 2px solid #f3f4f6;
            border-radius: 8px;
            color: #9ca3af;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .role-option input[type="radio"]:checked + label {
            border-color: #4f46e5;
            color: #4f46e5;
            background-color: #ffffff;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full glass-container p-10 rounded-[2.5rem] shadow-2xl text-center">
        <img src="logo.png" alt="SMKGB" class="school-logo" onerror="this.style.display='none'">
        <h2 class="text-3xl font-black text-gray-900">Sign Up</h2>
        <p class="text-gray-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-2">Join the Mission</p>

        <form id="signupForm" class="mt-8 space-y-4 text-left" action="dashboard.html">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Role</label>
                <div class="flex space-x-2">
                    <!-- User Option -->
                    <div class="flex-1 role-option">
                        <input type="radio" id="roleUser" name="userRole" value="user" checked>
                        <label for="roleUser">User</label>
                    </div>
                    <!-- Admin Option -->
                    <div class="flex-1 role-option">
                        <input type="radio" id="roleAdmin" name="userRole" value="admin">
                        <label for="roleAdmin">Admin</label>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Full Name</label>
                <input type="text" id="fullName" required class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="John Doe">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">School Email</label>
                <input type="email" id="email" required class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="name@moe-dl.edu.my">
            </div>

            <button type="submit" 
                    class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg shadow-xl shadow-indigo-200 hover:bg-indigo-700 transition-all mt-4">
                Sign Up Now
            </button>
        </form>

        <p class="mt-8 text-sm text-gray-500">
            Have account? <a href="login.html" class="text-indigo-600 font-bold hover:underline transition">Log In</a>
        </p>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get selected role
            const selectedRole = document.querySelector('input[name="userRole"]:checked').value;
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;

            // Save user session in browser storage
            const currentUser = {
                fullName: fullName,
                email: email,
                role: selectedRole
            };
            localStorage.setItem('currentUser', JSON.stringify(currentUser));

            // Redirect to dashboard
            window.location.href = 'dashboard.html';
        });
    </script>

</body>
</html>

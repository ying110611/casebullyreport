<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SMK GAJAH BERANG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #6366f1; }
        .glass-container { background: rgba(255, 255, 255, 0.98); }
        .school-logo { width: 65px; height: 65px; object-fit: contain; margin: 0 auto 1rem; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full glass-container p-10 rounded-[2.5rem] shadow-2xl text-center">
        <img src="logo.png" alt="SMKGB" class="school-logo" onerror="this.style.display='none'">
        <h2 class="text-3xl font-black text-gray-900">Sign Up</h2>
        <p class="text-gray-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-2">Join the Mission</p>

        <form id="signupForm" class="mt-8 space-y-4 text-left">
            <!-- Hidden field to keep track of selected role -->
            <input type="hidden" id="selectedRole" value="user">

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Role</label>
                <div class="flex space-x-2">
                    <button type="button" 
                            id="btnUser" 
                            onclick="selectRole('user')" 
                            class="flex-1 py-2 border-2 border-indigo-600 text-indigo-600 rounded-lg text-xs font-bold transition">
                        User
                    </button>
                    <button type="button" 
                            id="btnAdmin" 
                            onclick="selectRole('admin')" 
                            class="flex-1 py-2 border-2 border-gray-100 text-gray-400 rounded-lg text-xs font-bold hover:border-indigo-100 transition">
                        Admin
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Full Name</label>
                <input type="text" id="fullName" required class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="John Doe">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">School Email</label>
                <input type="email" id="email" required class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="name@moe-dl.edu.my">
            </div>

            <button type="submit" 
                    class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg shadow-xl shadow-indigo-200 hover:bg-indigo-700 transition-all mt-4">
                Sign Up Now
            </button>
        </form>

        <p class="mt-8 text-sm text-gray-500">
            Have account? <a href="login.html" class="text-indigo-600 font-bold hover:underline transition">Log In</a>
        </p>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // Function to toggle role styling between User and Admin
        function selectRole(role) {
            const btnUser = document.getElementById('btnUser');
            const btnAdmin = document.getElementById('btnAdmin');
            const roleInput = document.getElementById('selectedRole');

            roleInput.value = role;

            if (role === 'admin') {
                // Style Admin Button as Active
                btnAdmin.className = "flex-1 py-2 border-2 border-indigo-600 text-indigo-600 rounded-lg text-xs font-bold transition";
                // Style User Button as Inactive
                btnUser.className = "flex-1 py-2 border-2 border-gray-100 text-gray-400 rounded-lg text-xs font-bold hover:border-indigo-100 transition";
            } else {
                // Style User Button as Active
                btnUser.className = "flex-1 py-2 border-2 border-indigo-600 text-indigo-600 rounded-lg text-xs font-bold transition";
                // Style Admin Button as Inactive
                btnAdmin.className = "flex-1 py-2 border-2 border-gray-100 text-gray-400 rounded-lg text-xs font-bold hover:border-indigo-100 transition";
            }
        }

        // Handle Form Submission & Save to LocalStorage
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const role = document.getElementById('selectedRole').value;

            // Save user session
            const userSession = {
                fullName: fullName,
                email: email,
                role: role,
                isLoggedIn: true
            };

            localStorage.setItem('currentUser', JSON.stringify(userSession));

            // Redirect to dashboard
            window.location.href = 'dashboard.html';
        });
    </script>

</body>
</html>

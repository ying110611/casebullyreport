<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Analytics | SMK GAJAH BERANG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7fe; }
        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .school-logo { width: 45px; height: 45px; object-fit: contain; }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-white border-b border-gray-200 px-8 py-3 flex justify-between items-center shadow-sm mb-10">
        <div class="flex items-center space-x-3">
            <img src="logo.png" alt="SMKGB Logo" class="school-logo">
            <span class="text-xl font-black text-gray-800 tracking-tight">SMK GAJAH BERANG</span>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-6">
        <div class="flex justify-between items-start mb-10">
            <div>
                <h1 class="text-4xl font-black text-slate-900">Incident Analytics</h1>
                <p class="text-slate-500 mt-2">Real-time school safety data tracking.</p>
                <button id="clearDataBtn" class="mt-4 px-4 py-2 bg-red-50 text-red-600 border border-red-200 rounded-xl text-sm font-bold hover:bg-red-600 hover:text-white transition-all">
                    Reset All Data
                </button>
            </div>
            
            <div class="bg-white px-8 py-4 rounded-3xl shadow-sm border border-slate-200 text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total Cases</p>
                <p id="totalCount" class="text-4xl font-black text-indigo-600">0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="stat-card p-8 rounded-[2.5rem] shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <div class="p-3 bg-green-100 text-green-600 rounded-2xl">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <span class="text-[10px] font-bold px-3 py-1 bg-green-50 text-green-600 rounded-full">LEVEL 1</span>
                </div>
                <h3 class="text-slate-400 font-bold text-xs uppercase tracking-wider">Mild Cases</h3>
                <p id="mildCount" class="text-5xl font-black text-slate-900 mt-2">0</p>
                <div class="mt-8 h-2.5 bg-slate-100 rounded-full overflow-hidden">
                    <div id="mildBar" class="h-full bg-green-500 transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>

            <div class="stat-card p-8 rounded-[2.5rem] shadow-sm border-b-4 border-b-amber-400">
                <div class="flex justify-between items-center mb-6">
                    <div class="p-3 bg-amber-100 text-amber-600 rounded-2xl">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    </div>
                    <span class="text-[10px] font-bold px-3 py-1 bg-amber-50 text-amber-600 rounded-full">LEVEL 2</span>
                </div>
                <h3 class="text-slate-400 font-bold text-xs uppercase tracking-wider">Moderate Cases</h3>
                <p id="moderateCount" class="text-5xl font-black text-slate-900 mt-2">0</p>
                <div class="mt-8 h-2.5 bg-slate-100 rounded-full overflow-hidden">
                    <div id="moderateBar" class="h-full bg-amber-500 transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>

            <div class="stat-card p-8 rounded-[2.5rem] shadow-sm border-b-4 border-b-red-500">
                <div class="flex justify-between items-center mb-6">
                    <div class="p-3 bg-red-100 text-red-600 rounded-2xl">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <span class="text-[10px] font-bold px-3 py-1 bg-red-50 text-red-600 rounded-full">LEVEL 3</span>
                </div>
                <h3 class="text-slate-400 font-bold text-xs uppercase tracking-wider">Severe Cases</h3>
                <p id="severeCount" class="text-5xl font-black text-slate-900 mt-2">0</p>
                <div class="mt-8 h-2.5 bg-slate-100 rounded-full overflow-hidden">
                    <div id="severeBar" class="h-full bg-red-600 transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

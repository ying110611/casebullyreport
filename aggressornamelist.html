<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aggressor Records | SMK GAJAH BERANG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .school-logo { width: 40px; height: 40px; object-fit: contain; }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-white border-b border-gray-100 px-8 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-3">
            <img src="logo.png" alt="SMKGB Logo" class="school-logo">
            <span class="font-black text-gray-900 tracking-tight">SMK GAJAH BERANG</span>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-8 py-12">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h1 class="text-4xl font-black text-gray-900">Aggressor List</h1>
                <p class="text-gray-500 mt-2">Manage student conduct records and incident history.</p>
            </div>
            <div id="recordCount" class="bg-indigo-600 text-white px-6 py-2 rounded-2xl font-bold shadow-lg shadow-indigo-200">
                0 Records Found
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-xl shadow-gray-200/50 border border-gray-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-100">
                    <tr>
                        <th class="px-8 py-5 text-xs font-black text-gray-400 uppercase tracking-widest">Aggressor Name</th>
                        <th class="px-8 py-5 text-xs font-black text-gray-400 uppercase tracking-widest">Type</th>
                        <th class="px-8 py-5 text-xs font-black text-gray-400 uppercase tracking-widest">Severity</th>
                        <th class="px-8 py-5 text-xs font-black text-gray-400 uppercase tracking-widest">Date</th>
                        <th class="px-8 py-5 text-xs font-black text-gray-400 uppercase tracking-widest text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="aggressorTableBody" class="divide-y divide-gray-50">
                    </tbody>
            </table>
            
            <div id="emptyState" class="hidden py-20 text-center">
                <div class="text-5xl mb-4">📄</div>
                <p class="text-gray-400 font-bold uppercase tracking-widest text-xs">No records available</p>
            </div>
        </div>
    </main>

    <script>
        // 渲染表格的函数
        function renderTable() {
            const tableBody = document.getElementById('aggressorTableBody');
            const emptyState = document.getElementById('emptyState');
            const recordCountText = document.getElementById('recordCount');
            
            // 从 localStorage 读取数据
            let incidents = JSON.parse(localStorage.getItem('incidents')) || [];
            
            // 更新计数器
            recordCountText.innerText = `${incidents.length} Records Found`;

            if (incidents.length === 0) {
                tableBody.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            tableBody.innerHTML = incidents.map((item, index) => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-8 py-6 font-bold text-gray-700">${item.aggressor}</td>
                    <td class="px-8 py-6 text-sm text-gray-500">${item.type}</td>
                    <td class="px-8 py-6">
                        <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${
                            item.severity === 'Severe' ? 'bg-red-50 text-red-600' : 
                            item.severity === 'Moderate' ? 'bg-amber-50 text-amber-600' : 
                            'bg-green-50 text-green-600'
                        }">
                            ${item.severity}
                        </span>
                    </td>
                    <td class="px-8 py-6 text-sm text-gray-400">${item.date || '2026-04-12'}</td>
                    <td class="px-8 py-6 text-right">
                        <button onclick="deleteRecord(${index})" class="bg-red-50 text-red-600 hover:bg-red-600 hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition-all">
                            Delete
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // 删除单条记录的函数
        function deleteRecord(index) {
            if (confirm("Are you sure you want to delete this record?")) {
                let incidents = JSON.parse(localStorage.getItem('incidents')) || [];
                // 从数组中移除选中的索引
                incidents.splice(index, 1);
                // 保存回 localStorage
                localStorage.setItem('incidents', JSON.stringify(incidents));
                // 重新渲染表格
                renderTable();
            }
        }

        // 页面加载时执行
        window.onload = renderTable;
    </script>
</body>
</html>

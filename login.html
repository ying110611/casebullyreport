<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SMK GAJAH BERANG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #6366f1; }
        .glass-container { background: rgba(255, 255, 255, 0.98); }
        .school-logo { width: 65px; height: 65px; object-fit: contain; margin: 0 auto 1rem; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full glass-container p-10 rounded-[2.5rem] shadow-2xl text-center">
        <img src="logo.png" alt="SMKGB" class="school-logo">
        <h2 class="text-3xl font-black text-gray-900">Admin Login</h2>
        <p class="text-gray-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-2">SMK GAJAH BERANG Portal</p>

        <div class="mt-8 space-y-5 text-left">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">School Email</label>
                <input type="email" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="name@moe-dl.edu.my">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Password</label>
                <input type="password" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="••••••••">
            </div>

            <button type="button" 
              onclick="location.href='dashboard.html'" 
              class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg shadow-xl shadow-indigo-200 hover:bg-indigo-700 transition-all mt-4">
              Login Now
            </button>
        </div>

        <p class="mt-8 text-sm text-gray-500">
            New user? <a href="signup.html" class="text-indigo-600 font-bold hover:underline">Create Account</a>
        </p>
        <a href="index.html" class="inline-block mt-6 text-xs font-bold text-gray-300 hover:text-gray-500 uppercase">← Back to Home</a>
    </div>

</body>
</html>
